# DigitalOcean App Platform spec.
# One app "artifacts-hub" with a static_site component per subdomain.
# To add a new subdomain: append another entry to static_sites (source_dir + domain), commit, push.
# DO will detect the change and provision the new component automatically.

name: artifacts-hub
region: nyc

static_sites:
  - name: slides
    source_dir: /slides
    github:
      repo: ogarocious/artifacts-hub
      branch: main
      deploy_on_push: true
    # Path-based routing: /steal-this/ resolves to slides/steal-this/index.html
    catchall_document: index.html
    # Custom domain (add via DO dashboard after first deploy, then Hostinger CNAME)
    # domains:
    #   - domain: slides.ogarocious.com
    #     type: PRIMARY

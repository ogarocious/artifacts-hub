# DigitalOcean App Platform spec.
# One app "artifacts-hub" with a static_site component per subdomain.
# To add a new subdomain: append another entry to static_sites (source_dir + domain), commit, push.
# DO will detect the change and provision the new component automatically.

name: artifacts-hub
region: nyc

# Custom domains at app level. DO validates the CNAME (already added in Hostinger)
# and provisions Let's Encrypt SSL automatically. When adding future subdomains
# (proposals, mockups), add here AND to ingress rules below to route by host.
domains:
  - domain: slides.ogarocious.com
    type: PRIMARY

static_sites:
  - name: slides
    source_dir: /slides
    environment_slug: html
    build_command: ""
    output_dir: /
    github:
      repo: ogarocious/artifacts-hub
      branch: main
      deploy_on_push: true
    catchall_document: index.html
    index_document: index.html

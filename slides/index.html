<style>

  h1 {

    font-size: 1.1rem;
    max-width: 40ch;
    margin-bottom: 4rem;
    position: relative;
  }
  .list-heading {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    color: #7ba4a5;
    margin-bottom: 1.25rem;

  ul { list-style: none; position: relative; }

    display: block;

    color: #f5eee0;
    padding: 1.25rem 1.5rem;
    background: rgba(26, 20, 16, 0.55);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(212, 85, 43, 0.14);
    border-radius: 8px;
    transition: transform 220ms ease, border-color 220ms ease;
  }
  a.artifact:hover { border-color: rgba(212, 85, 43, 0.34); transform: translateY(-2px); }
  .artifact-title { font-weight: 600; font-size: 1.15rem; margin-bottom: 0.2rem; }
  .artifact-desc { color: rgba(245, 238, 224, 0.72); font-size: 0.9rem; }
  footer {

  footer a { color: rgba(245, 238, 224, 0.72); text-decoration: none; }

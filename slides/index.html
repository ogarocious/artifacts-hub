  .page-ember {

    background:

  .text-shadow-warm {

      0 2px 8px rgba(0, 0, 0, 0.35);
  }

  :focus-visible {
    outline: 2px solid #d4552b;
    outline-offset: 3px;
    border-radius: 2px;
  }

  /* Glass card, same as artifact */
  .glass {
    background: rgba(26, 20, 16, 0.55);
    backdrop-filter: blur(20px) saturate(180%);

    border: 1px solid rgba(212, 85, 43, 0.14);
    box-shadow:

    transition: transform 220ms ease, border-color 220ms ease;
  }
  .glass:hover, .glass:focus-visible {
    border-color: rgba(212, 85, 43, 0.34);
    transform: translateY(-2px);
  }

  .accent-rule {
    display: inline-block; width: 40px; height: 2px;

    letter-spacing: 0.16em;
    color: #7ba4a5;
    text-transform: uppercase;
